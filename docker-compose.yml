services:
  nats:
    image: nats:2.10
    container_name: lavender-nats
    command: ["-c", "/etc/nats/nats-server.conf"]
    # Bound to localhost only
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - ./docker/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - lavender-nats-data:/data
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: lavender-timescale
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: lavender
      POSTGRES_PASSWORD: lavender
      POSTGRES_DB: lavender
    volumes:
      - lavender-db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    # we need to gate dependents on this so they don't crash loop while Postgres runs its
    # init scripts for first timw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lavender -d lavender"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ingest:
    build:
      context: .
      dockerfile: docker/ingest/Dockerfile
    container_name: lavender-ingest
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_started
    restart: on-failure

  telemetry-writer:
    build:
      context: .
      dockerfile: docker/telemetry-writer/Dockerfile
    container_name: lavender-telemetry-writer
    environment:
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgres://lavender:lavender@timescaledb:5432/lavender?sslmode=disable
    depends_on:
      nats:
        condition: service_started
      timescaledb:
        condition: service_healthy
    restart: on-failure

  detection:
    build:
      context: .
      dockerfile: docker/detection/Dockerfile
    container_name: lavender-detection
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_started
      ingest:
        condition: service_started
    restart: on-failure

  alert-writer:
    build:
      context: .
      dockerfile: docker/alert-writer/Dockerfile
    container_name: lavender-alert-writer
    environment:
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgres://lavender:lavender@timescaledb:5432/lavender?sslmode=disable
    depends_on:
      nats:
        condition: service_started
      timescaledb:
        condition: service_healthy
      detection:
        condition: service_started
    restart: on-failure

  control-plane:
    build:
      context: .
      dockerfile: docker/control-plane/Dockerfile
    container_name: lavender-control-plane
    environment:
      - DATABASE_URL=postgres://lavender:lavender@timescaledb:5432/lavender?sslmode=disable
      - NATS_URL=nats://nats:4222
      - HTTP_ADDR=:8080
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      nats:
        condition: service_started
      timescaledb:
        condition: service_healthy
    restart: on-failure

  agent:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
    container_name: lavender-agent
    privileged: true
    depends_on:
      nats:
        condition: service_started
      ingest:
        condition: service_started
    restart: on-failure
    volumes:
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/kernel/tracing:/sys/kernel/tracing
      - /sys/kernel/debug:/sys/kernel/debug

volumes:
  lavender-db-data:
  lavender-nats-data:
