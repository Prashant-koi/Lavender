services:
  nats:
    image: nats:2.10
    container_name: lavender-nats
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./docker/nats/nats-server.conf:/etc/nats/nats-server.conf:ro

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: lavender-timescale
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lavender
      POSTGRES_PASSWORD: lavender
      POSTGRES_DB: lavender
    volumes:
      - lavender-db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    

  ingest:
    build:
      context: .
      dockerfile: docker/ingest/Dockerfile
    container_name: lavender-ingest
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    restart: on-failure

  telemetry-writer:
    build:
      context: .
      dockerfile: docker/telemetry-writer/Dockerfile
    container_name: lavender-telemetry-writer
    environment:
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgres://lavender:lavender@timescaledb:5432/lavender?sslmode=disable
    depends_on:
      - nats
      - timescaledb
    restart: on-failure

  agent:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
    container_name: lavender-agent
    privileged: true
    depends_on:
      - nats
      - ingest
    restart: on-failure
    volumes:
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/kernel/tracing:/sys/kernel/tracing
      - /sys/kernel/debug:/sys/kernel/debug

volumes:
  lavender-db-data:
